<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>F1 App</title>
    <link rel="stylesheet" href="style.css?v=5">


<link rel="icon" type="image/png" href="https://ksizorcode.github.io/f1/assets/icons/favicon-96x96.png" sizes="96x96" />
<link rel="icon" type="image/svg+xml" href="https://ksizorcode.github.io/f1/assets/icons/favicon.svg" />
<link rel="shortcut icon" href="https://ksizorcode.github.io/f1/assets/icons/favicon.ico" />
<link rel="apple-touch-icon" sizes="180x180" href="https://ksizorcode.github.io/f1/assets/icons/apple-touch-icon.png" />
<meta name="apple-mobile-web-app-title" content="F1 App" />
<link rel="manifest" href="https://ksizorcode.github.io/f1/assets/icons/site.webmanifest" />



<!-- 🍏 iOS soporte fullscreen -->
<meta name="apple-mobile-web-app-capable" content="yes">

<!-- Barra estilo -->
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

</head>
<body>
    <header>
<button onclick="activarModoCarrera()">🏁 Modo carrera</button>

<script>
function activarModoCarrera() {
  document.documentElement.requestFullscreen();
}
</script>
    </header>
    
    <main>
    

<h1>🏁 Clasificación F1 2024</h1>

<input type="text" id="buscador" placeholder="🔍 Buscar piloto o equipo...">

<select id="orden">
  <option value="pos">🏆 Posición</option>
  <option value="puntos">🔥 Puntos</option>
</select>

<table border="1" width="100%" id="tablaF1">
  <thead>
    <tr>
      <th>🏆</th>
      <th>Piloto</th>
      <th>Equipo</th>
      <th>🔥 Puntos</th>
    </tr>
  </thead>
  <tbody></tbody>
</table>

    </main>

    <footer>
        <p>&copy; F1</p>
    </footer>

    <script src="app.js"></script>

    <script>
    // 🏎️ Clasificación F1 2024 (ejemplo realista)
        const clasificacionF1 = [
        { pos: 1, piloto: "Max Verstappen", equipo: "Red Bull", puntos: 575, pais: "🇳🇱" },
        { pos: 2, piloto: "Sergio Pérez", equipo: "Red Bull", puntos: 285, pais: "🇲🇽" },
        { pos: 3, piloto: "Lewis Hamilton", equipo: "Mercedes", puntos: 234, pais: "🇬🇧" },
        { pos: 4, piloto: "Fernando Alonso", equipo: "Aston Martin", puntos: 206, pais: "🇪🇸" },
        { pos: 5, piloto: "Charles Leclerc", equipo: "Ferrari", puntos: 206, pais: "🇲🇨" },
        { pos: 6, piloto: "Lando Norris", equipo: "McLaren", puntos: 205, pais: "🇬🇧" },
        { pos: 7, piloto: "Carlos Sainz", equipo: "Ferrari", puntos: 200, pais: "🇪🇸" },
        { pos: 8, piloto: "George Russell", equipo: "Mercedes", puntos: 175, pais: "🇬🇧" },
        { pos: 9, piloto: "Oscar Piastri", equipo: "McLaren", puntos: 150, pais: "🇦🇺" },
        { pos: 10, piloto: "Lance Stroll", equipo: "Aston Martin", puntos: 90, pais: "🇨🇦" }
        ];



        const tbody = document.querySelector("#tablaF1 tbody");
const buscador = document.getElementById("buscador");
const orden = document.getElementById("orden");

// 🧩 Render tabla
function renderTabla(datos) {
  tbody.innerHTML = "";

  datos.forEach(p => {
    tbody.innerHTML += `
      <tr>
        <td>🏁 ${p.pos}</td>
        <td>${p.pais} ${p.piloto}</td>
        <td>🏎️ ${p.equipo}</td>
        <td>🔥 ${p.puntos}</td>
      </tr>
    `;
  });
}

// 🔍 Filtrar
function filtrarDatos() {
  const texto = buscador.value.toLowerCase();

  let filtrados = clasificacionF1.filter(p =>
    p.piloto.toLowerCase().includes(texto) ||
    p.equipo.toLowerCase().includes(texto)
  );

  ordenarDatos(filtrados);
}

// 🔃 Ordenar
function ordenarDatos(datos) {
  const tipo = orden.value;

  let ordenados = [...datos].sort((a, b) => {
    if (tipo === "puntos") return b.puntos - a.puntos;
    return a.pos - b.pos;
  });

  renderTabla(ordenados);
}

// 🎧 Eventos
buscador.addEventListener("input", filtrarDatos);
orden.addEventListener("change", () => filtrarDatos());

// 🚀 Inicial
renderTabla(clasificacionF1);
    </script>
</body>
</html>
